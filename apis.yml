aid: brilliant-org
name: Brilliant
description: >-
  Brilliant is an online learning platform for interactive STEM education,
  covering mathematics, computer science, data, and science. Headquartered
  in San Francisco and used by over ten million learners worldwide,
  Brilliant pairs guided, problem-first lessons with adaptive practice that
  blends classic intelligent tutoring systems, machine-learning recommender
  systems, and natural-language conversations. The platform is delivered
  through brilliant.org and native iOS and Android apps, with a freemium
  model and a Brilliant Premium subscription that unlocks the full course
  catalog, including expanding AI-powered features such as personalized
  tutoring conversations and on-the-fly generation of interactive content.
  Brilliant operates as a direct-to-consumer subscription business with an
  educator program for classroom access; it does not publish a public
  developer API, SDK, or partner integration program, and the
  `github.com/brilliant` org on GitHub is an unrelated namespace of
  personal projects rather than an official Brilliant presence.
